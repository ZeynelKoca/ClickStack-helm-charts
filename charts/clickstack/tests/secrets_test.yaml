suite: Test ClickStack Secret
templates:
  - hyperdx/secret.yaml
tests:
  - it: should render clickstack-secret Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: clickstack-secret
      - equal:
          path: type
          value: Opaque

  - it: should contain default secret values
    asserts:
      - equal:
          path: stringData.HYPERDX_API_KEY
          value: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      - equal:
          path: stringData.CLICKHOUSE_PASSWORD
          value: "otelcollectorpass"

  - it: should use custom secret values when provided
    set:
      hyperdx:
        secrets:
          HYPERDX_API_KEY: "custom-api-key"
          CLICKHOUSE_PASSWORD: "custom-password"
    asserts:
      - equal:
          path: stringData.HYPERDX_API_KEY
          value: "custom-api-key"
      - equal:
          path: stringData.CLICKHOUSE_PASSWORD
          value: "custom-password"
